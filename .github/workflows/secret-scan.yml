name: Secret Scan
on: [push, pull_request]
jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: sudo apt-get install -y gitleaks
      - name: Run gitleaks
        run: gitleaks detect --source . -v
